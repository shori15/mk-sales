<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#b8922a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MK料金" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>MK 料金計算</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#f5f4f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#111;max-width:480px;margin:0 auto;padding-bottom:48px;}
    input,select,button{font-family:inherit;}
    .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f4f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:32px;max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%);}
    .login-logo{width:72px;height:72px;background:#111;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;color:#b8922a;letter-spacing:2px;margin-bottom:12px;}
    .login-title{font-size:18px;font-weight:800;color:#111;margin-bottom:4px;}
    .login-sub{font-size:11px;color:#888;margin-bottom:40px;letter-spacing:.5px;}
    .login-field{width:100%;margin-bottom:12px;}
    .login-field label{display:block;font-size:10px;color:#888;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:6px;}
    .login-field input{width:100%;padding:12px 14px;border-radius:10px;background:#fff;border:1px solid #e0ddd5;color:#111;font-size:15px;outline:none;}
    .login-field input:focus{border-color:#b8922a;}
    .login-btn{width:100%;padding:13px;border-radius:10px;background:#111;border:none;color:#b8922a;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;letter-spacing:.5px;}
    .login-btn:disabled{opacity:.5;}
    .login-error{color:#c04020;font-size:12px;text-align:center;margin-top:10px;min-height:18px;}
    .wrong-img{width:160px;height:160px;object-fit:cover;border-radius:16px;margin-top:12px;display:none;}
  </style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-logo">MK</div>
  <div class="login-title">MK 料金計算</div>
  <div class="login-sub">料金表準拠</div>
  <div class="login-field">
    <label>ID</label>
    <input type="text" id="login-id" placeholder="ID を入力" autocomplete="username" />
  </div>
  <div class="login-field">
    <label>パスワード</label>
    <input type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
  </div>
  <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>
  <div class="login-error" id="login-error"></div>
  <img src="wrong.jpg" class="wrong-img" id="wrong-img" alt="wrong password" />
</div>

<div id="app-root"></div>

<script>
const AUTH_ID = 'tokyomk';

// Base64 → ArrayBuffer
function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

// パスワードで app.enc を復号
async function decryptApp(password) {
  const res = await fetch('app.enc', {cache:'no-store'});
  if (!res.ok) throw new Error('暗号ファイルが見つかりません');
  const enc = await res.json();

  const salt = b64ToBuf(enc.salt);
  const iv = b64ToBuf(enc.iv);
  const data = b64ToBuf(enc.data);

  // PBKDF2で鍵導出
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    {name:'PBKDF2'}, false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:enc.iter, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false, ['decrypt']
  );

  // AES-GCM復号
  const decrypted = await crypto.subtle.decrypt(
    {name:'AES-GCM', iv}, key, data
  );
  return new TextDecoder().decode(decrypted);
}

// 復号したHTMLをページに挿入して実行
function injectApp(html) {
  const root = document.getElementById('app-root');
  // HTMLとscriptを分離
  const scriptMatch = html.match(/<script>([\s\S]*)<\/script>/);
  const scriptContent = scriptMatch ? scriptMatch[1] : '';
  const htmlContent = html.replace(/<script>[\s\S]*<\/script>/, '');

  root.innerHTML = htmlContent;

  // scriptを実行
  const s = document.createElement('script');
  s.textContent = scriptContent;
  document.body.appendChild(s);

  document.getElementById('login-screen').style.display = 'none';
}

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (id !== AUTH_ID) {
    errEl.textContent = 'IDまたはパスワードが違います';
    document.getElementById('login-pw').value = '';
    document.getElementById('wrong-img').style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '認証中...';
  errEl.textContent = '';

  try {
    const html = await decryptApp(pw);
    // 復号成功 → セッション保存（パスワードを保持して再ログイン省略）
    sessionStorage.setItem('mk_pw', pw);
    injectApp(html);
  } catch (e) {
    errEl.textContent = 'IDまたはパスワードが違います';
    document.getElementById('login-pw').value = '';
    document.getElementById('wrong-img').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

// セッション中は自動ログイン
(async function(){
  const savedPw = sessionStorage.getItem('mk_pw');
  if (savedPw) {
    try {
      const html = await decryptApp(savedPw);
      injectApp(html);
    } catch(e) {
      sessionStorage.removeItem('mk_pw');
    }
  }
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
